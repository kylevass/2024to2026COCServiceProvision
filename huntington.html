let active = ["# served"];
let showTrend = true;

const labels = DATA.months.map(m => {
  const [y, mo] = m.split("-");
  return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+mo-1] + " '" + y.slice(2);
});

function trend(vals) {
  const n = vals.length;
  let sx=0, sy=0, sxy=0, sxx=0;
  for (let i = 0; i < n; i++) { sx += i; sy += vals[i]; sxy += i * vals[i]; sxx += i * i; }
  const sl = (n * sxy - sx * sy) / (n * sxx - sx * sx), b = (sy - sl * sx) / n;
  return vals.map((_, i) => +(sl * i + b).toFixed(1));
}

// Build category buttons
const ctrl = document.getElementById("controls");
const trendLabel = document.getElementById("trendToggle").parentElement;
Object.keys(DATA.series).forEach(key => {
  const btn = document.createElement("button");
  btn.className = "btn";
  btn.dataset.key = key;
  btn.innerHTML = `<span class="dot" style="background:${COLORS[key]}"></span>${NAMES[key]}`;
  btn.onclick = () => toggle(key);
  ctrl.insertBefore(btn, trendLabel);
});

function toggle(key) {
  if (active.includes(key)) {
    if (active.length === 1) return;
    active = active.filter(k => k !== key);
  } else {
    active.push(key);
  }
  render();
}

const ctx = document.getElementById("chart").getContext("2d");
const chart = new Chart(ctx, {
  type: "line",
  data: { labels, datasets: [] },
  options: {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: "index", intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: "#fff", titleColor: "#1a1a2e", bodyColor: "#444",
        borderColor: "#ddd", borderWidth: 1, cornerRadius: 6, padding: 10,
        titleFont: { weight: "600" }, bodyFont: { size: 13 },
        callbacks: {
          label: c => c.dataset.label?.includes("trend") ? null : ` ${c.dataset.label}: ${c.parsed.y.toLocaleString()}`
        }
      }
    },
    scales: {
      x: {
        title: { display: true, text: "Month", font: { size: 12, weight: "600" }, color: "#444" },
        grid: { color: "#eee" },
        ticks: { font: { size: 11, family: 'GT America Condensed' }, maxRotation: 45, autoSkip: false }
      },
      y: {
        title: { display: true, text: "People Served", font: { size: 12, weight: "600" }, color: "#444" },
        grid: { color: "#eee" },
        ticks: { font: { size: 11, family: 'GT America Condensed' }, callback: v => v.toLocaleString() },
        beginAtZero: false
      }
    }
  }
});

function render() {
  document.querySelectorAll(".btn").forEach(b => {
    const k = b.dataset.key, on = active.includes(k);
    b.classList.toggle("active", on);
    b.style.background = on ? COLORS[k] : "#fff";
    b.style.color = on ? "#fff" : "#333";
    b.style.borderColor = on ? "transparent" : "#ccc";
  });

  const ds = [];
  active.forEach(key => {
    const c = COLORS[key];
    ds.push({
      label: NAMES[key], data: DATA.series[key],
      borderColor: c, backgroundColor: c + "15", borderWidth: 2.5,
      pointRadius: 3, pointHoverRadius: 5, pointBackgroundColor: c,
      tension: 0.3, fill: active.length === 1
    });
    if (showTrend) {
      ds.push({
        label: NAMES[key] + " trend", data: trend(DATA.series[key]),
        borderColor: c, borderWidth: 1.5, borderDash: [6, 4],
        pointRadius: 0, pointHoverRadius: 0, tension: 0, fill: false
      });
    }
  });
  chart.data.datasets = ds;

  if (active.includes("# served")) {
    chart.options.scales.y.max = 700;
  } else {
    const allVals = active.flatMap(k => DATA.series[k]);
    const mx = Math.max(...allVals);
    chart.options.scales.y.max = Math.ceil(mx / 50) * 50;
  }
  chart.options.scales.y.min = 0;

  chart.update();

  document.getElementById("note").textContent = "";
}

document.getElementById("trendToggle").addEventListener("change", e => { showTrend = e.target.checked; render(); });
render();
</script>
</body>
</html>
